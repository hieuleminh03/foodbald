<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uppercup Football</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-touch-callout: none !important; user-select: none !important; -webkit-user-select: none !important; }
        html, body {
            background: #1D2F41;
            overflow: hidden;
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        #game {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        ruffle-player {
            width: 100%;
            height: 100%;
            touch-action: none;
        }
        ruffle-player * {
            -webkit-touch-callout: none !important;
            user-select: none !important;
        }
        .ruffle-context-menu, .context-menu, [class*="menu"] {
            display: none !important;
            visibility: hidden !important;
            opacity: 0 !important;
            pointer-events: none !important;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        window.RufflePlayer = window.RufflePlayer || {};
        window.RufflePlayer.config = {
            showMenu: false,
            autoplay: "on",
            unmuteOverlay: "hidden",
            contextMenu: "off"
        };
        window.addEventListener("load", (event) => {
            const ruffle = window.RufflePlayer.newest();
            const player = ruffle.createPlayer();
            player.style.width = "100%";
            player.style.height = "100%";
            player.setAttribute("allowscriptaccess", "always");
            const container = document.getElementById("game");
            container.appendChild(player);
            player.load("bin/client.swf");
        });

        function blockMenu(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        }
        document.addEventListener("contextmenu", blockMenu, true);
        document.addEventListener("selectstart", blockMenu, true);
        document.addEventListener("dragstart", blockMenu, true);
        document.addEventListener("touchstart", function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener("touchmove", function(e) {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
        document.addEventListener("gesturestart", blockMenu, true);
        document.addEventListener("gesturechange", blockMenu, true);
        document.addEventListener("gestureend", blockMenu, true);

        const observer = new MutationObserver(function(mutations) {
            document.querySelectorAll('.ruffle-context-menu, .context-menu').forEach(function(el) {
                el.style.display = 'none';
                el.remove();
            });
        });
        observer.observe(document.body, { childList: true, subtree: true });
    </script>
    <script src="ruffle/ruffle.js"></script>
</body>
</html>
